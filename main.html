<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>
    <style>
        .navbar {
            background-color: #D3D3D3;
            padding: 10px;
        }

        .navbar ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .navbar ul li {
            display: inline;
            margin-right: 1rem;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact Us</li>
            <li>Itinerary</li>
        </ul>
    </div>
</body>
</html>
